; https://github.com/uiriansan/SilentSDDM/wiki/Customizing
; Customized for nightfall.jpg wallpaper — warm soft tones, elegant fonts

[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = ""
background-fill-mode = "fill"

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = "/home/%{user}/Pictures/wallpapers/nightfall.jpg"
use-background-color = false
background-color = "#0d0d1a"
blur = 0
brightness = 0.05
saturation = 0.9

[LockScreen.Clock]
display = true
position = "top-left"
align = "left"
; 12-hour format with AM/PM
format = "h:mm AP"
font-family = "Cormorant Garamond"
font-size = 72
font-weight = 700
; Warm cream/gold to contrast the cool night sky
color = "#f5e6c8"

[LockScreen.Date]
display = true
format = "dddd, MMMM dd, yyyy"
locale = "en_US"
font-family = "Cormorant Garamond"
font-size = 15
font-weight = 400
color = "#d4bfa0"
margin-top = -12

[LockScreen.Message]
display = true
position = "bottom-left"
align = "left"
text = ""
font-family = "Cormorant Garamond"
font-size = 13
font-weight = 400
display-icon = true
icon = "enter.svg"
icon-size = 16
color = "#c9b49a"
paint-icon = true
spacing = 0

[LoginScreen]
background = "/home/%{user}/Pictures/wallpapers/nightfall.jpg"
use-background-color = false
background-color = "#0d0d1a"
blur = 0
brightness = 0.05
saturation = 0.9

[LoginScreen.LoginArea]
position = "left"
margin = -1
blur = 28

[LoginScreen.LoginArea.Avatar]
shape = "circle"
border-radius = 35
active-size = 120
inactive-size = 80
inactive-opacity = 0.30
active-border-size = 1
inactive-border-size = 0
; Warm gold border on active avatar
active-border-color = "#c9a96e"
inactive-border-color = "#c9a96e"

[LoginScreen.LoginArea.Username]
font-family = "Cormorant Garamond"
font-size = 18
font-weight = 600
color = "#f5e6c8"
margin = 10

[LoginScreen.LoginArea.PasswordInput]
width = 200
height = 32
display-icon = true
font-family = "Cormorant Garamond"
font-size = 13
icon = "password.svg"
icon-size = 16
content-color = "#f5e6c8"
background-color = "#c9a96e"
background-opacity = 0.12
border-size = 1
border-color = "#c9a96e"
border-radius-left = 8
border-radius-right = 8
margin-top = 10
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#c9a96e"
background-opacity = 0.15
active-background-color = "#c9a96e"
active-background-opacity = 0.35
icon = "arrow-right.svg"
icon-size = 18
content-color = "#f5e6c8"
active-content-color = "#f5e6c8"
border-size = 1
border-color = "#c9a96e"
border-radius-left = 8
border-radius-right = 8
margin-left = 5
show-text-if-no-password = true
hide-if-not-needed = false
font-family = "Cormorant Garamond"
font-size = 13
font-weight = 600

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Logging in"
font-family = "Cormorant Garamond"
font-weight = 600
font-size = 14
icon-size = 30
icon = "spinner.svg"
color = "#f5e6c8"
spacing = 5

[LoginScreen.LoginArea.WarningMessage]
font-family = "Cormorant Garamond"
font-size = 12
font-weight = 400
normal-color = "#d4bfa0"
warning-color = "#e8c97a"
error-color = "#e8896a"
margin-top = 10

[LoginScreen.MenuArea.Buttons]
margin-top = 50
margin-right = 50
margin-bottom = 50
margin-left = 50
size = 30
border-radius = 5
spacing = 10
font-family = "Cormorant Garamond"

[LoginScreen.MenuArea.Popups]
max-height = 300
item-height = 30
item-spacing = 2
padding = 5
display-scrollbar = true
margin = 5
background-color = "#1a1428"
background-opacity = 0.85
active-option-background-color = "#c9a96e"
active-option-background-opacity = 0.25
content-color = "#f5e6c8"
active-content-color = "#f5e6c8"
font-family = "Cormorant Garamond"
border-size = 1
border-color = "#c9a96e"
font-size = 12
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-left"
index = 0
popup-direction = "up"
popup-align = "center"
display-session-name = true
button-width = 200
popup-width = 200
background-color = "#c9a96e"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#d4bfa0"
active-content-color = "#f5e6c8"
border-size = 0
font-size = 11
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = "bottom-right"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 180
display-layout-name = true
background-color = "#c9a96e"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#d4bfa0"
active-content-color = "#f5e6c8"
border-size = 0
font-size = 11
icon = "language.svg"
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = "bottom-right"
index = 0
background-color = "#c9a96e"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#d4bfa0"
active-content-color = "#f5e6c8"
border-size = 0
icon = "keyboard.svg"
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-right"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 100
background-color = "#c9a96e"
background-opacity = 0.0
active-background-opacity = 0.25
content-color = "#d4bfa0"
active-content-color = "#f5e6c8"
border-size = 0
icon = "power.svg"
icon-size = 16

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = "login"
start-hidden = true
background-color = "#1a1428"
background-opacity = 0.85
key-content-color = "#f5e6c8"
key-color = "#c9a96e"
key-opacity = 0.12
key-active-background-color = "#c9a96e"
key-active-opacity = 0.30
selection-background-color = "#c9a96e"
selection-content-color = "#0d0d1a"
primary-color = "#c9a96e"
border-size = 0
border-color = "#c9a96e"

[Tooltips]
enable = true
font-family = "Cormorant Garamond"
font-size = 12
content-color = "#f5e6c8"
background-color = "#1a1428"
background-opacity = 0.90
border-radius = 5
disable-user = false
disable-login-button = false
