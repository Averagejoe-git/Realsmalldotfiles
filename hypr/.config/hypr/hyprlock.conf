# hyprlock.conf
# Colors sourced from chudbaru.png
# Palette:
#   background/dark    → rgb(26, 22, 20)       deep charcoal-brown
#   surface            → rgb(90, 46, 28)        rusty sienna
#   overlay            → rgba(26, 22, 20, 0.65) translucent dark
#   accent orange      → rgb(200, 114, 42)      jacket trim orange
#   accent gold        → rgb(212, 168, 75)      warm blonde gold
#   accent rose        → rgb(196, 122, 106)     dusty ribbon rose
#   accent blue        → rgb(106, 122, 154)     muted slate blue (eyes)
#   text primary       → rgb(232, 221, 208)     warm off-white
#   text secondary     → rgb(180, 160, 140)     muted warm grey

general {
    disable_loading_bar    = true
    hide_cursor            = true
    grace                  = 0
    no_fade_in             = false
    no_fade_out            = false
}

# ─── BACKGROUND ──────────────────────────────────────────────────────────────

background {
    monitor    =
    path       = screenshot                    # blurs your actual desktop
    blur_size  = 7
    blur_passes = 3
    noise      = 0.0117
    contrast   = 0.8916
    brightness = 0.8172
    vibrancy   = 0.1696
    vibrancy_darkness = 0.0

    # warm dark tint layered over the blur
    color      = rgba(26, 22, 20, 0.55)
}

# ─── CLOCK (12-hour format) ───────────────────────────────────────────────────

label {
    monitor    =
    text       = cmd[update:1000] echo "$(date +"%I:%M")"
    color      = rgba(232, 221, 208, 0.96)
    font_size  = 96
    font_family = JetBrains Mono Bold

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(26, 22, 20, 0.80)
    shadow_boost  = 1.2

    position   = 0, 80
    halign     = center
    valign     = center
}

# AM / PM indicator
label {
    monitor    =
    text       = cmd[update:1000] echo "$(date +"%p")"
    color      = rgba(200, 114, 42, 0.90)      # accent orange
    font_size  = 22
    font_family = JetBrains Mono Medium

    position   = 0, 18
    halign     = center
    valign     = center
}

# ─── DATE ────────────────────────────────────────────────────────────────────

label {
    monitor    =
    text       = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color      = rgba(180, 160, 140, 0.85)     # text secondary
    font_size  = 18
    font_family = JetBrains Mono

    position   = 0, -30
    halign     = center
    valign     = center
}

# ─── PASSWORD INPUT ───────────────────────────────────────────────────────────

input-field {
    monitor    =
    size       = 300, 52
    outline_thickness = 2
    dots_size  = 0.30
    dots_spacing = 0.20
    dots_center = true
    dots_rounding = -1                         # circular dots

    # surface: sienna-brown tinted overlay
    outer_color = rgba(200, 114, 42, 0.85)     # accent orange border
    inner_color = rgba(26, 22, 20, 0.75)       # dark bg fill
    font_color  = rgba(232, 221, 208, 0.95)    # warm off-white text

    # state colors
    check_color   = rgba(212, 168, 75, 0.90)   # gold — checking
    fail_color    = rgba(196, 122, 106, 0.90)  # dusty rose — fail
    capslock_color = rgba(106, 122, 154, 0.90) # slate blue — caps lock

    placeholder_text = <span foreground="##b4a08c">󰌾  enter password</span>
    fail_text        = <span foreground="##c47a6a">󰯈  incorrect</span>

    rounding   = 10
    fade_on_empty = true
    fade_timeout = 2000

    position   = 0, -110
    halign     = center
    valign     = center
}

# ─── GREETING / USER ─────────────────────────────────────────────────────────

label {
    monitor    =
    text       = cmd[update:0] echo "  $USER"
    color      = rgba(212, 168, 75, 0.80)      # warm gold
    font_size  = 14
    font_family = JetBrains Mono

    position   = 0, -168
    halign     = center
    valign     = center
}
